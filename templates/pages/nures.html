
{% extends 'base.html' %}

{% block content %}

<h2 class="text-center m-3">📋 أدارة الممرضين </h2>

<form action="" method="POST" class="p-3 ">
   {% csrf_token %}
  <input type="text" name="nures_name" placeholder="اسم الممرض" class="form-control mb-2" required>
  <input type="text" name="responsible_doctor" placeholder="ألدكتور ألمسئول" class="form-control mb-2" >
  <input type="text" name="phone" placeholder="الهاتف" class="form-control mb-2" required>
  
   <button type="submit" class="btn btn-success">إضافة</button>
</form>

<table class="table table-striped table-bordered mt-4 text-center">
  <thead class="thead-dark">
    <tr>
      <th>الاسم</th>
      <th>الدكتور المسؤول</th>
      <th>الهاتف</th>
      <th>التعديل أو الحذف</th>
    </tr>
  </thead>

  <tbody>
    
    {% for p in all_Nures %}
    <tr>

      <td>{{p.nures_name}}</td>
      <td>{{p.responsible_doctor}}</td>
      <td>{{p.phone}}</td>
      <td> 
        <a href="{% url 'update_nures' p.id %}" class="btn btn-info ">تعديل</a>
         <a href="{% url 'delete_item' 'nurse' p.id %}" class="btn btn-danger">حذف</a> 
      </td>

    </tr>
      {% endfor %}
     
  

  </tbody>
</table>
{% endblock %}
