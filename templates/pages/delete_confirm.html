{% extends 'base.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">

<div class="card shadow-lg border-0 text-center p-5" style="max-width:540px; width:100%; border-radius:18px;">

<div class="mb-3" style="font-size:50px;">
⚠️
</div>

<h3 class="text-danger mb-3">تأكيد الحذف</h3>

<p class="text fs-5 mb-4">
هل أنت متأكد أنك تريد حذف هذا العنصر؟
</p>

<div class="bg-light p-3 rounded mb-4">
<strong class="fs-5">{{ item }}</strong>
</div>

<form method="POST">
{% csrf_token %}

<div class="d-flex justify-content-center gap-4 ">

<button type="submit" class="btn btn-danger px-5 ">
🗑️ حذف
</button>
 
<a href="javascript:history.back()" class="btn btn-secondary px-5 ">
↩️ تراجع
</a>

</div>

</form>

</div>

</div>

{% endblock %}
