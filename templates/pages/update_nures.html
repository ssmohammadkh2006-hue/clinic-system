{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h2 class="text-center m-3">تعديل الممرضين</h2>

<form method="POST" class="p-3">

{% csrf_token %}

<input type="text" name="nures_name" value="{{ nurse.nures_name }}" class="form-control mb-2">

<input type="text" name="responsible_doctor" value="{{ nurse.responsible_doctor }}" class="form-control mb-2">

<input type="text" name="phone" value="{{ nurse.phone }}" class="form-control mb-2">

<button type="submit" class="btn btn-success">تعديل</button>

</form>

</div>

{% endblock %}
